name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'claude/**']
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  build:
    name: Build Plugin
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Verify build output
        run: |
          test -f com.nathanm412.vumeter.sdPlugin/bin/plugin.js
          test -f com.nathanm412.vumeter.sdPlugin/manifest.json
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdPlugin
          path: com.nathanm412.vumeter.sdPlugin/

  package:
    name: Package (.streamDeckPlugin)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run pack
      - name: Upload packaged plugin
        uses: actions/upload-artifact@v4
        with:
          name: streamDeckPlugin
          path: '*.streamDeckPlugin'

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [package]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: streamDeckPlugin
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.streamDeckPlugin'
          generate_release_notes: true
