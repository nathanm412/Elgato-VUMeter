name: Release on Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.merged == true &&
      (contains(github.event.pull_request.labels.*.name, 'Pre-Release') ||
       contains(github.event.pull_request.labels.*.name, 'New-Release'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm run pack

      - name: Determine release type
        id: release-type
        run: |
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q "New-Release"; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate version tag
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(echo "${{ github.event.pull_request.merge_commit_sha }}" | cut -c1-7)
          DATE=$(date -u +%Y%m%d)

          if [ "${{ steps.release-type.outputs.is_prerelease }}" = "true" ]; then
            TAG="v${BASE_VERSION}-pre.${DATE}.${SHORT_SHA}"
          else
            TAG="v${BASE_VERSION}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Check tag does not already exist
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists. For full releases, bump the version in package.json first."
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.event.pull_request.merge_commit_sha }}
          files: '*.streamDeckPlugin'
          prerelease: ${{ steps.release-type.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
